name: Build and Push Docker Image
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
  workflow_dispatch:
      
jobs: 
  build:
    runs-on: ubuntu-latest 
    steps:

      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 2.5: Preparar la Oracle Wallet en el runner de GitHub
      - name: Prepare Oracle Wallet
        run: |
          mkdir -p wallet
          echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 --decode > wallet/wallet.zip
          unzip -j -o wallet/wallet.zip -d wallet/
          sed -i 's|"?/network/admin"|"/app/wallet"|g' wallet/sqlnet.ora
          rm wallet/wallet.zip

      # Paso 3: Construir la imagen de Docker
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg ORACLE_TNS_NAME="${{ secrets.ORACLE_TNS_NAME }}" \
            --build-arg ORACLE_DB_USER="${{ secrets.ORACLE_DB_USER }}" \
            --build-arg ORACLE_DB_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
            --build-arg AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          
     # Paso 5: Configurar credenciales de AWS para SSH, incluyendo AWS_SESSION_TOKEN
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Cambia a tu región
          # aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
    # Paso 5.5: 
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa


      # Paso 6: Conectarse a EC2 y desplegar el contenedor
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Autenticar en DockerHub desde EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            # Descargar la última versión de la imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            
            # Preparar la Oracle Wallet
            mkdir -p ~/oracle_wallet
            echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 --decode > ~/oracle_wallet/wallet.zip
            unzip -j -o ~/oracle_wallet/wallet.zip -d ~/oracle_wallet/
            sed -i 's|"?/network/admin"|"/app/wallet"|g' ~/oracle_wallet/sqlnet.ora
            rm ~/oracle_wallet/wallet.zip
            
            # Parar y eliminar cualquier contenedor previo o proceso en el puerto 8080
            docker stop my-app || true && docker rm my-app || true
            docker stop $(docker ps -a -q) || true
            docker rm $(docker ps -a -q) || true
            sudo fuser -k 8080/tcp || true
            
            # Iniciar el contenedor
            docker run -d --name my-app -p 8080:8080 \
              -v ~/oracle_wallet:/app/wallet \
              -e TNS_ADMIN_PATH="/app/wallet" \
              -e ORACLE_TNS_NAME="${{ secrets.ORACLE_TNS_NAME }}" \
              -e ORACLE_DB_USER="${{ secrets.ORACLE_DB_USER }}" \
              -e ORACLE_DB_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
              -e AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e AWS_REGION="us-east-1" \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
              
            # Esperar 10 segundos para ver si la app se estrella y mostrar los errores
            sleep 10
            docker logs my-app
          EOF
