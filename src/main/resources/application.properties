# ==========================================
# Configuración de Oracle Cloud (SEGURA)
# ==========================================
# NOTA IMPORTANTE: NUNCA escribas tu contraseña directamente aquí para no subirla a GitHub.
# 
# Si vas a subir esto a GitHub y usas GitHub Actions, debes guardar estos valores
# en la sección de "Settings -> Secrets and variables -> Actions" de tu repositorio.
#
# Para ejecutar localmente en VS Code:
# 1. Asegúrate de que las credenciales están en tu archivo .vscode/launch.json
# 2. Ve al menú lateral "Ejecutar y Depurar" (ícono de bicho) 
# 3. Selecciona "MicroservicioApplication" y dale al botón de Play.
#
spring.datasource.url=jdbc:oracle:thin:@${ORACLE_TNS_NAME}
spring.datasource.username=${ORACLE_DB_USER}
spring.datasource.password=${ORACLE_DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.data-source-properties.oracle.net.tns_admin=${TNS_ADMIN_PATH}
spring.datasource.hikari.data-source-properties.oracle.net.wallet_location=(SOURCE=(METHOD=file)(METHOD_DATA=(DIRECTORY=${TNS_ADMIN_PATH})))
# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Configuración de Spring Security OAuth2 (Microsoft Entra ID)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://duocazurecloudn.b2clogin.com/tfp/76b75f28-e0f9-4305-9b31-f6f69d880cfe/b2c_1_duocdemoazure_registro_login/v2.0/

# Configuración como Cliente OAuth2 (Login desde el navegador)
spring.security.oauth2.client.registration.azure-b2c.client-id=f4e2b3c0-289e-4619-9ab6-c7d750007352
spring.security.oauth2.client.registration.azure-b2c.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.azure-b2c.scope=openid,profile,offline_access,f4e2b3c0-289e-4619-9ab6-c7d750007352
spring.security.oauth2.client.registration.azure-b2c.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure-b2c.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.azure-b2c.issuer-uri=https://duocazurecloudn.b2clogin.com/tfp/76b75f28-e0f9-4305-9b31-f6f69d880cfe/b2c_1_duocdemoazure_registro_login/v2.0/
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

